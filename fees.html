<!DOCTYPE html>
<html>
<head>
<title>Fees</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="fees"></body>

<h2>💰 Fee Management</h2>

<div id="fees"></div>

<script>
async function loadFees() {
    const res = await fetch("/students");
    const students = await res.json();

    let html = "";

    students.forEach(s => {
        let status = Math.random() > 0.5 ? "✅ Paid" : "❌ Pending";

        html += `
        <div class="card">
            <h3>👨‍🎓 ${s.name}</h3>
            <p>${s.course}</p>
            <p>Fee Status: <b>${status}</b></p>

            <button>Update Payment</button>
        </div>
        `;
    });

    document.getElementById("fees").innerHTML = html;
}

loadFees();
</script>

</body>
</html>
